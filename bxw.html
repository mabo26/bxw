<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="博肖書單">
<title>博肖文書單</title>
<style>
:root{

}
@media(prefers-color-scheme:dark){:root{
--bg:#0c0818;--bg2:#120820;--bg3:#1a0d30;--border:#2d1f4a;--text:#e2d9f3;--text2:#c8b4e0;--text3:#6b4f8a;--accent:#7c3aed;--accent2:#9333ea;--pill-bg:#1e1235;--pill-border:#3b2a5a;--pill-text:#a78bca;--card-bg:#150d25;--card-border:#2d1f4a;--sheet-bg:#1a0d30;--input-bg:#0c0818;--sr-bg:#1a0d30;--sbox-bg:#0c0818;--sbox-text:#c8b4e0;--tag-bg:#1e1235;--tag-text:#6b4f8a;--del-bg:#2d0f0f;--del-text:#f87171;--sub-text:#9370bb
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100vh}
input,button{font-family:inherit}
#hd{background:linear-gradient(180deg,var(--bg3),var(--bg2));border-bottom:1px solid var(--border);padding:14px 14px 10px;position:sticky;top:0;z-index:50}
#h1{display:flex;align-items:center;gap:8px;margin-bottom:10px}
#ttl{font-size:18px;font-weight:700;color:var(--accent);letter-spacing:1px;flex:1}
#addbtn{background:var(--accent);border:none;color:#fff;border-radius:10px;padding:8px 16px;font-size:14px;font-weight:600;cursor:pointer}
#sw{position:relative;margin-bottom:8px}
#si{width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:10px 36px 10px 12px;font-size:14px;outline:none}
#si::placeholder{color:var(--text3)}
#sc{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);font-size:22px;cursor:pointer;display:none;line-height:1}
#sr{background:var(--sr-bg);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:8px;font-size:13px;line-height:1.8;display:none}
#fp{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.pill{background:var(--pill-bg);border:1px solid var(--pill-border);color:var(--pill-text);border-radius:20px;padding:4px 11px;font-size:12px;cursor:pointer;white-space:nowrap}
.pill.on{background:var(--accent);border-color:var(--accent2);color:#fff}
#srow{display:flex;align-items:center;justify-content:space-between}
#fc{font-size:11px;color:var(--text3)}
#srtbtn{background:var(--pill-bg);border:1px solid var(--pill-border);color:var(--pill-text);border-radius:20px;padding:4px 11px;font-size:12px;cursor:pointer}
#list{padding:10px 12px 100px}
.card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;padding:12px 14px;cursor:pointer;margin-bottom:7px;transition:border-color .15s}
.card:active{border-color:var(--accent)}
.cr{display:flex;align-items:center;gap:8px}
.rb{color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;flex-shrink:0}
.ct{font-size:14px;font-weight:600;color:var(--text);flex:1;line-height:1.3}
.rtag{font-size:10px;color:var(--tag-text);background:var(--tag-bg);padding:2px 6px;border-radius:6px;flex-shrink:0}
.csub{font-size:11px;color:var(--text3);margin-top:5px}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:flex-end;justify-content:center;z-index:100}
.sh{background:var(--sheet-bg);border:1px solid var(--border);border-radius:18px 18px 0 0;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;padding:20px 18px 40px}
.str{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.stit{font-size:16px;font-weight:700;color:var(--accent);flex:1}
.xb{background:none;border:none;color:var(--text3);font-size:26px;cursor:pointer;line-height:1;padding:0}
.fl{font-size:12px;color:var(--sub-text);display:block;margin-bottom:5px;margin-top:12px}
.fi{width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:9px;color:var(--text);padding:9px 12px;font-size:14px;outline:none}
.fi:focus{border-color:var(--accent)}
.rr{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.rbtn{flex:1;min-width:48px;padding:8px 0;border-radius:9px;border:2px solid transparent;color:#fff;cursor:pointer;font-weight:700;font-size:13px;text-align:center}
.rbtn.sel{border-color:var(--text)!important}
.ckr{display:flex;align-items:center;gap:8px;margin-top:14px;margin-bottom:16px}
.ckr label{font-size:13px;color:var(--sub-text);cursor:pointer}
.subbtn{width:100%;padding:13px 0;border-radius:12px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:600;cursor:pointer}
.dbr{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.dtag{padding:4px 10px;border-radius:10px;font-size:13px;border:1px solid}
.di{margin-bottom:8px;font-size:13px}
.dk{color:var(--text3);margin-right:4px}
.dv{color:var(--text)}
.sbox{background:var(--sbox-bg);border-radius:10px;padding:10px 12px;margin-bottom:14px}
.sbox p{color:var(--sbox-text);font-size:13px;line-height:1.7;margin:0}
.ar{display:flex;gap:8px;margin-top:4px}
.ab{flex:1;padding:10px 0;border-radius:10px;border:1px solid var(--border);background:none;color:var(--accent);cursor:pointer;font-size:14px}
.db{padding:10px 18px;border-radius:10px;border:none;background:var(--del-bg);color:var(--del-text);cursor:pointer;font-size:14px}
</style>
</head>
<body>
<div id="hd">
  <div id="h1">
    <span id="ttl">博肖文書單 📚</span>
    <span id="tc" style="font-size:12px;color:var(--text3)"></span>
    <button onclick="openBackup()" style="background:none;border:1px solid var(--border);color:var(--text3);border-radius:10px;padding:7px 11px;font-size:16px;cursor:pointer" title="備份">☁️</button>
    <button id="addbtn" onclick="openAdd()">＋ 新增</button>
  </div>
  <div id="sw">
    <input id="si" placeholder="搜尋書名、作者… 查看有沒有讀過" oninput="doSearch(this.value)" autocomplete="off" spellcheck="false">
    <button id="sc" onclick="clearS()">×</button>
  </div>
  <div id="sr"></div>
  <div id="fp"></div>
  <div id="srow"><span id="fc"></span><button id="srtbtn" onclick="toggleSort()">評分↓</button></div>
</div>
<div id="list"></div>
<div id="ao" class="ov" style="display:none" onclick="if(event.target===this)closeAdd()">
<div class="sh">
  <div class="str"><span class="stit">＋ 新增一本書</span><button class="xb" onclick="closeAdd()">×</button></div>
  <label class="fl">書名 *</label><input id="ft" class="fi" placeholder="例：有名" onkeydown="if(event.key==='Enter')submitAdd()">
  <label class="fl">作者</label><input id="fau" class="fi" placeholder="例：木更木更">
  <label class="fl">主角名</label><input id="fch" class="fi" placeholder="例：梁漁/許驚蟄">
  <label class="fl">職業</label><input id="fj" class="fi" placeholder="例：影帝/視帝">
  <label class="fl">簡介</label><input id="fsu" class="fi" placeholder="例：契約營業假戲真做">
  <label class="fl">評分</label><div class="rr" id="arr"></div>
  <div class="ckr"><input type="checkbox" id="frn"><label for="frn">換頭文</label></div>
  <button class="subbtn" onclick="submitAdd()">＋ 加入書單</button>
</div></div>
<!-- BACKUP -->
<div id="bo" class="ov" style="display:none" onclick="if(event.target===this)closeBackup()">
<div class="sh">
  <div class="str"><span class="stit">☁️ 備份書單</span><button class="xb" onclick="closeBackup()">×</button></div>
  <div style="font-size:13px;color:var(--text3);margin-bottom:14px">共 <span id="bk-count"></span> 本。建議同時用兩種方法備份，雙重保險！</div>

  <div style="background:var(--sbox-bg);border-radius:12px;padding:14px;margin-bottom:10px">
    <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px">方法一 📋 複製到備忘錄</div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:10px">iCloud 自動同步，換手機後備忘錄裡就有</div>
    <button onclick="doCopy()" id="copybtn" style="width:100%;padding:11px 0;border-radius:10px;border:none;background:var(--accent);color:#fff;font-size:14px;font-weight:600;cursor:pointer">📋 複製書單文字</button>
  </div>

  <div style="background:var(--sbox-bg);border-radius:12px;padding:14px;margin-bottom:14px">
    <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px">方法二 📁 下載成檔案</div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:10px">存到 iCloud Drive / Files，永久保存</div>
    <button onclick="doDownload()" style="width:100%;padding:11px 0;border-radius:10px;border:none;background:#0ea5e9;color:#fff;font-size:14px;font-weight:600;cursor:pointer">📁 下載備份檔案</button>
  </div>

  <div style="background:var(--sbox-bg);border-radius:12px;padding:14px">
    <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px">📥 還原書單</div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:8px">方法一：貼上備忘錄裡的文字</div>
    <textarea id="import-txt" style="width:100%;height:70px;background:var(--input-bg);border:1px solid var(--border);border-radius:9px;color:var(--text);padding:9px;font-size:12px;outline:none;resize:none" placeholder="貼上備份文字..."></textarea>
    <button onclick="doImport()" style="width:100%;padding:10px 0;border-radius:10px;border:none;background:#059669;color:#fff;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px">從文字還原</button>
    <div style="font-size:12px;color:var(--text3);margin:10px 0 8px">方法二：選擇備份檔案</div>
    <label style="display:block;width:100%;padding:10px 0;border-radius:10px;border:2px dashed var(--border);color:var(--text3);font-size:14px;text-align:center;cursor:pointer">
      選擇 .json 備份檔案
      <input type="file" accept=".json" onchange="doImportFile(event)" style="display:none">
    </label>
  </div>
</div></div>

<div class="sh" id="ds"></div></div>

let novels=[], sortM='rating', filterM='all', searchQ='', addR=4.5, detailId=null, editR=false;

function load(){
  try{
    const d=localStorage.getItem(SK);
    if(d){const p=JSON.parse(d);if(p&&p.length>0){novels=p;return;}}
  }catch(e){}
  novels=SEED.map((x,i)=>({id:i+1,t:x[0],a:x[1],rn:x[2],c:x[3],j:x[4],s:x[5],r:x[6]}));
  save();
}
function save(){try{localStorage.setItem(SK,JSON.stringify(novels));}catch(e){}}

function getFiltered(){
  const q=searchQ.trim().toLowerCase();
  return novels.filter(n=>{
    const mq=!q||[n.t,n.a,n.s,n.c,n.j].some(x=>(x||'').toLowerCase().includes(q));
    const mr=filterM==='all'?true:filterM==='4.6'?n.r>=4.6:filterM==='4.5'?n.r>=4.5&&n.r<4.6:filterM==='4.2'?n.r>=4.2&&n.r<4.5:filterM==='4.0'?n.r>=4.0&&n.r<4.2:n.r<4.0;
    return mq&&mr;
  }).sort((a,b)=>sortM==='rating'?b.r-a.r:a.t.localeCompare(b.t,'zh-Hant'));
}

function render(){
  const f=getFiltered(), tot=novels.length;
  document.getElementById('tc').textContent=`共${tot}本`;
  document.getElementById('fc').textContent=f.length<tot?`顯示${f.length}/${tot}`:`${tot}本`;
  document.getElementById('srtbtn').textContent=sortM==='rating'?'評分↓':'書名↑';
  const cnt={'4.6':novels.filter(n=>n.r>=4.6).length,'4.5':novels.filter(n=>n.r>=4.5&&n.r<4.6).length,'4.2':novels.filter(n=>n.r>=4.2&&n.r<4.5).length,'4.0':novels.filter(n=>n.r>=4.0&&n.r<4.2).length,'low':novels.filter(n=>n.r<4.0).length};
  document.getElementById('fp').innerHTML=[['全部','all'],['神作 '+cnt['4.6'],'4.6'],['佳作 '+cnt['4.5'],'4.5'],['不錯 '+cnt['4.2'],'4.2'],['還好 '+cnt['4.0'],'4.0'],['其他 '+cnt['low'],'low']].map(([l,v])=>`<button class="pill${filterM===v?' on':''}" onclick="setF('${v}')">${l}</button>`).join('');
  document.getElementById('list').innerHTML=f.map(n=>{
    const cl=rc(n.r);
    return`<div class="card" onclick="openD(${n.id})"><div class="cr"><span class="rb" style="background:${cl}">${n.r}</span><span class="ct">${n.t}</span>${n.rn?'<span class="rtag">換頭</span>':''}</div>${(n.a||n.j)?`<div class="csub">${n.a?n.a:''}${n.j?' · '+n.j:''}</div>`:''}</div>`;
  }).join('');
}

function doSearch(v){
  searchQ=v;
  document.getElementById('sc').style.display=v?'block':'none';
  const q=v.trim().toLowerCase(), sr=document.getElementById('sr');
  if(q){
    const ms=novels.filter(n=>[n.t,n.a,n.s,n.c,n.j].some(x=>(x||'').toLowerCase().includes(q)));
    if(ms.length){
      const b=ms.sort((a,bb)=>bb.r-a.r)[0];
      sr.style.display='block';
      sr.innerHTML=`<span style="color:#4ade80">✅ 已讀過</span> — 共找到 <strong style="color:#c084fc">${ms.length}</strong> 筆<br>最相關：<strong>${b.t}</strong> <span style="background:${rc(b.r)};color:#fff;padding:1px 7px;border-radius:8px;font-size:11px">${b.r}</span>${b.a?` <span style="color:#6b4f8a;font-size:12px">${b.a}</span>`:''}`;
    }else{
      sr.style.display='block';
      sr.innerHTML=`<span style="color:#f87171">❌ 未在書單中</span> — 「${v}」沒有收錄過`;
    }
  }else{sr.style.display='none';}
  render();
}
function clearS(){document.getElementById('si').value='';doSearch('');}
function setF(v){filterM=v;render();}
function toggleSort(){sortM=sortM==='rating'?'title':'rating';render();}

function openD(id){detailId=id;editR=false;renderD();document.getElementById('do').style.display='flex';}
function closeDetail(){document.getElementById('do').style.display='none';detailId=null;}
function renderD(){
  const n=novels.find(x=>x.id===detailId);if(!n)return;
  const cl=rc(n.r),lb=rl(n.r);
  const er=editR?`<div style="margin-bottom:14px"><div style="font-size:12px;color:#9370bb;margin-bottom:8px">選擇新評分</div><div class="rr">${RS.map(r=>`<button class="rbtn${n.r===r?' sel':''}" style="background:${rc(r)}" onclick="chR(${r})">${r}</button>`).join('')}</div></div>`:'';
  document.getElementById('ds').innerHTML=`<div class="str"><span class="stit" style="color:#e2d9f3;font-size:17px">${n.t}</span><button class="xb" onclick="closeDetail()">×</button></div><div class="dbr"><span style="background:${cl};color:#fff;padding:4px 14px;border-radius:10px;font-weight:700;font-size:15px">★ ${n.r}</span><span class="dtag" style="color:${cl};border-color:${cl}50;background:#1e1235">${lb}</span>${n.rn?'<span class="dtag" style="color:#6b4f8a;border-color:#3b2a5a;background:#1e1235">換頭文</span>':''}</div>${n.a?`<div class="di"><span class="dk">作者</span><span style="color:#c084fc">${n.a}</span></div>`:''} ${n.c?`<div class="di"><span class="dk">主角</span><span class="dv">${n.c}</span></div>`:''} ${n.j?`<div class="di"><span class="dk">職業</span><span class="dv">${n.j}</span></div>`:''} ${n.s?`<div class="sbox"><p>${n.s}</p></div>`:''} ${er}<div class="ar"><button class="ab" onclick="toggleER()">${editR?'取消':'✏️ 改評分'}</button><button class="db" onclick="delN(${n.id})">刪除</button></div>`;
}
function toggleER(){editR=!editR;renderD();}
function chR(r){novels=novels.map(n=>n.id===detailId?{...n,r}:n);save();editR=false;renderD();render();}
function delN(id){if(!confirm('確定刪除？'))return;novels=novels.filter(n=>n.id!==id);save();closeDetail();render();}

function openAdd(){
  addR=4.5;
  ['ft','fau','fch','fj','fsu'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('frn').checked=false;
  renderAR();
  document.getElementById('ao').style.display='flex';
  setTimeout(()=>document.getElementById('ft').focus(),100);
}
function closeAdd(){document.getElementById('ao').style.display='none';}
function renderAR(){document.getElementById('arr').innerHTML=RS.map(r=>`<button class="rbtn${addR===r?' sel':''}" style="background:${rc(r)}" onclick="setAR(${r})">${r}</button>`).join('');}
function setAR(r){addR=r;renderAR();}
function submitAdd(){
  const t=document.getElementById('ft').value.trim();
  if(!t){document.getElementById('ft').focus();return;}
  novels.unshift({id:Date.now(),t,a:document.getElementById('fau').value.trim(),c:document.getElementById('fch').value.trim(),j:document.getElementById('fj').value.trim(),s:document.getElementById('fsu').value.trim(),rn:document.getElementById('frn').checked?1:0,r:addR});
  save();closeAdd();render();
}

  // 分段複製，每段200本，備忘錄放得下
  const total=novels.length;
  const chunk=200;
  const parts=Math.ceil(total/chunk);
  let text="📚博肖書單備份 共"+total+"本\n=====\n";
  for(let i=0;i<total;i++){
    const n=novels[i];
    text+=(i+1)+". "+n.t+(n.a?" ("+n.a+")":"")+" ★"+n.r+"\n";
  }
  text+="=====\n【完整備份資料】\n"+JSON.stringify(novels);
  const btn=document.getElementById("copybtn");
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent="✅ 已複製！去備忘錄貼上";
    setTimeout(()=>{btn.textContent="📋 複製到備忘錄（iCloud同步）";},3000);
  }).catch(()=>{
    const ta=document.createElement("textarea");
    ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);
    btn.textContent="✅ 已複製！去備忘錄貼上";
    setTimeout(()=>{btn.textContent="📋 複製到備忘錄（iCloud同步）";},3000);
  });
}

function doDownload(){
  const data=JSON.stringify(novels,null,2);
  const blob=new Blob([data],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  const d=new Date();
  a.download="博肖書單備份_"+d.getFullYear()+(d.getMonth()+1).toString().padStart(2,"0")+d.getDate().toString().padStart(2,"0")+".json";
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function doImport(){
  const txt=document.getElementById("import-txt").value.trim();
  if(!txt){alert("請先貼上備份文字");return;}
  try{
    const parsed=JSON.parse(txt);
    if(!Array.isArray(parsed)||parsed.length===0){alert("格式不對，請確認是正確的備份文字");return;}
    if(!confirm("確定還原？現有書單會被覆蓋，共 "+parsed.length+" 本。"))return;
    novels=parsed;save();closeBackup();render();
    alert("✅ 還原成功！共 "+novels.length+" 本");
  }catch(e){alert("格式不對，請確認是正確的備份文字");}
}

function doImportFile(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const parsed=JSON.parse(ev.target.result);
      if(!Array.isArray(parsed)||parsed.length===0){alert("格式不對");return;}
      if(!confirm("確定還原？共 "+parsed.length+" 本。"))return;
      novels=parsed;save();closeBackup();render();
      alert("✅ 還原成功！共 "+novels.length+" 本");
    }catch(e){alert("格式不對");}
  };
  reader.readAsText(file);
}

load();render();
</script>
